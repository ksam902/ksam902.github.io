        <link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css" />
        <link rel="stylesheet" type="text/css" href="assets/css/main.css" />
        <title>COMPANY NAME</title>
    </head>
    <body>
      <nav class="navbar navbar-inverse navbar-fixed-top animate">
          <div class="container navbar-more visible-xs">
            <form class="navbar-form navbar-left" role="search">
              <div class="form-group">
                <div class="input-group">
                  <input type="text" class="form-control" placeholder="Search for...">
                  <span class="input-group-btn">
                    <button class="btn btn-default" type="submit">Submit</button>
                  </span>
                </div>
              </div>
            </form>
            <ul class="nav navbar-nav">
              <li><a href="#">PROFILE</a></li>
              <li role="separator" class="divider"></li>
          </div>
          <div class="container">
            <div class="navbar-header hidden-xs">
              <a class="navbar-brand" href="noSignIn.html"><img alt="Brand" src="assets/images/veikel-logo.png"></a>
            </div>

            <ul class="nav navbar-nav navbar-right mobile-bar">
              <li>
                <a href="register.html">
                  <span class="menu-icon fa fa-user-o"></span>
                  <span class="hidden-xs"><strong>Register</strong></span>
                  <span class="visible-xs">Register</span>
                </a>
              </li>
              <li>
                <a href="#" role="button" data-toggle="modal" data-target="#login-modal">
                  <span class="menu-icon fa fa-lock"></span>
                  <span class="hidden-xs">Sign In</span>
                  <span class="visible-xs">Sign In</span>
                </a>
              </li>
            </ul>
          </div>
      </nav>
      <div class="container">
      </div>
      <!-- BEGIN # MODAL LOGIN -->
      <div class="modal fade" id="login-modal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true" style="display: none;">
            <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header" align="center">
                <img class="img-circle" id="img_logo" src="assets/images/veikel-logo-grey.png">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                  <span class="glyphicon glyphicon-remove" aria-hidden="true"></span>
                </button>
              </div>
                      
                <!-- Begin # DIV Form -->
                <div id="div-forms">
                    <!-- Begin # Login Form -->
                    <form id="login-form">
                    <div class="modal-body">
                      <input id="login_username" class="form-control" type="text" placeholder="email" required>
                      <input id="login_password" class="form-control" type="password" placeholder="password" required>
                      <div class="checkbox">
                          <label>
                              <input type="checkbox"> Remember me
                          </label>
                      </div>
                    </div>
                  <div class="modal-footer">
                    <div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block">Login</button>
                    </div>
                    <div>
                        <button id="login_lost_btn" type="button" class="btn btn-link">Lost Password?</button>
                        <button id="login_register_btn" type="button" class="btn btn-link">Register</button>
                    </div>
                  </div>
                    </form>
                    <form id="lost-form" style="display:none;">
                      <div class="modal-body">
                        <input id="lost_email" class="form-control" type="text" placeholder="email" required>
                      </div>
                      <div class="modal-footer">
                        <div>
                            <button type="submit" class="btn btn-primary btn-lg btn-block">Send</button>
                        </div>
                        <div>
                            <button id="lost_login_btn" type="button" class="btn btn-link">Log In</button>
                            <button id="lost_register_btn" type="button" class="btn btn-link">Register</button>
                        </div>
                      </div>
                    </form>
                    <form id="register-form" style="display:none;">
                      <div class="modal-body">
                        <div id="div-register-msg">
                            <div id="icon-register-msg" class="glyphicon glyphicon-chevron-right"></div>
                            <span id="text-register-msg">Register an account.</span>
                        </div>
                        <input id="register_username" class="form-control" type="text" placeholder="Username (type ERROR for error effect)" required>
                        <input id="register_email" class="form-control" type="text" placeholder="E-Mail" required>
                        <input id="register_password" class="form-control" type="password" placeholder="Password" required>
                      </div>
                      <div class="modal-footer">
                        <div>
                            <button type="submit" class="btn btn-primary btn-lg btn-block">Register</button>
                        </div>
                        <div>
                            <button id="register_login_btn" type="button" class="btn btn-link">Log In</button>
                            <button id="register_lost_btn" type="button" class="btn btn-link">Lost Password?</button>
                        </div>
                      </div>
                    </form>
                </div>
            </div>
          </div>
        </div>
    <!-- END # MODAL LOGIN -->
        <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
        <script type="text/javascript" src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
        <script type="text/javascript" src="assets/js/main.js"></script>
    </body>
</html>
