<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" />
        <link rel="stylesheet" type="text/css" href="assets/css/main.css" />
        <title>VEIKEL</title>
    </head>
    <body>
        <div class="jumbotron">
            <div class="jumbotron-container">
                <h1 id="title">VEIKEL</h1>
                <p>...</p>
                <p><a class="btn btn-primary btn-lg" href="#" role="button">Learn more</a></p>
            </div>
        </div>
        <div class="app">
            <form class="form-horizontal">
                <fieldset>
                <!-- Text input-->
                <div class="form-group">
                  <label class="col-md-4 control-label" for="txtEmail"></label>  
                  <div class="col-md-4">
                  <input id="txtEmail" name="txtEmail" type="text" placeholder="Email" class="form-control input-md" required="">
                  </div>
                </div>
                <!-- Password input-->
                <div class="form-group">
                  <label class="col-md-4 control-label" for="txtPassword"></label>
                  <div class="col-md-4">
                    <input id="txtPassword" name="txtPassword" type="password" placeholder="Password" class="form-control input-md" required="">
                    
                  </div>
                </div>

                <!-- Button -->
                <div class="form-group">
                  <label class="col-md-4 control-label" for="btnLogin"></label>
                  <div class="col-md-4">
                    <button id="btnLogin" name="btnLogin" class="btn btn-danger">Login</button>
                  </div>
                </div>

                <!-- Button -->
                <div class="form-group">
                  <label class="col-md-4 control-label" for="btnSignUp"></label>
                  <div class="col-md-4">
                  <a href="newUserForm.html" id="btnSignUp" name="btnSignUp" class="btn btn-primary" role="button">Sign Up</a>
                  </div>
                </div>

                </fieldset>
            </form>
        </div>
        <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
        <script type="text/javascript" src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
        <script type="text/javascript" src="assets/js/main.js"></script>
    </body>
</html>
